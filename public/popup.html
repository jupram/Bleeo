<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bleeo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="popup-title">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">B</div>
          <div>
            <p class="eyebrow">Mental-space filter</p>
            <h1 id="popup-title">Bleeo</h1>
          </div>
        </div>
        <p class="lede">Keep loud language softened while the page stays usable.</p>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <span>Protection</span>
          <strong id="state-chip" class="state-chip">Loading</strong>
        </div>

        <label class="toggle switch-row">
          <span class="label-stack">
            <span>Extension</span>
            <small>Across supported sites</small>
          </span>
          <input id="global-enabled" type="checkbox" />
          <span class="switch-ui" aria-hidden="true"></span>
        </label>

        <label class="toggle switch-row">
          <span class="label-stack">
            <span>This site</span>
            <small id="site-label">Checking current page</small>
          </span>
          <input id="site-enabled" type="checkbox" />
          <span class="switch-ui" aria-hidden="true"></span>
        </label>

        <label class="field">
          <span class="field-label">Sensitivity</span>
          <span class="select-shell">
            <select id="sensitivity">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </span>
        </label>

        <div class="status-grid" aria-label="Current filter state">
          <div class="status-card">
            <span class="status-label">Mode</span>
            <strong id="mode">Loading</strong>
          </div>
          <div class="status-card">
            <span class="status-label">Page</span>
            <strong id="site-status">Loading</strong>
          </div>
        </div>

        <div class="actions">
          <button id="snooze-site" class="button secondary" type="button">Pause this site</button>
          <button id="open-options" class="button" type="button">Open settings</button>
        </div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
